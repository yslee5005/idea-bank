<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>📱 앱 아이디어 뱅크</title>
<style>
:root{--bg:#0f1115;--card:#1a1d24;--card2:#21252e;--line:#2c313c;--txt:#e6e8ec;--mut:#9aa3b2;--acc:#6ea8fe;--good:#5ad19a;--warn:#f0b357;--bad:#ef6b73;}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo",sans-serif;background:var(--bg);color:var(--txt);line-height:1.5}
header{position:sticky;top:0;z-index:10;background:rgba(15,17,21,.97);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:12px 16px}
h1{margin:0 0 4px;font-size:18px}
.meta{color:var(--mut);font-size:12px;margin-bottom:10px}
#q{width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--line);background:var(--card2);color:var(--txt);font-size:14px}
.row{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px;align-items:center}
.lbl{font-size:11px;color:var(--mut);margin-right:2px}
.chip{padding:5px 10px;border-radius:999px;border:1px solid var(--line);background:var(--card);color:var(--mut);font-size:12px;cursor:pointer;user-select:none}
.chip.on{background:var(--acc);color:#0a1020;border-color:var(--acc);font-weight:600}
.chip b{opacity:.75;font-weight:400;margin-left:4px}
.chip.s-save.on{background:var(--good);border-color:var(--good)} .chip.s-new.on{background:var(--acc);border-color:var(--acc)}
.chip.s-hide.on{background:var(--bad);border-color:var(--bad)} .chip.s-all.on{background:#e6e8ec;border-color:#e6e8ec;color:#10131a}
.btn{padding:5px 10px;border-radius:8px;border:1px solid var(--line);background:var(--card2);color:var(--mut);font-size:12px;cursor:pointer}
.btn:hover{color:var(--txt);border-color:var(--acc)}
main{max-width:1100px;margin:0 auto;padding:14px 14px 70px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 15px 12px;transition:.12s;position:relative}
.card:hover{border-color:var(--acc)}
.card.st-save{border-color:var(--good);box-shadow:inset 3px 0 0 var(--good)}
.card.st-hide{opacity:.5;border-style:dashed}
.id{display:inline-block;font-size:11px;font-weight:700;color:var(--acc);background:rgba(110,168,254,.12);padding:2px 8px;border-radius:6px;letter-spacing:.3px}
.nm{font-size:16px;font-weight:700;margin:8px 0 6px}
.f{font-size:13px;margin:5px 0}
.f .k{color:var(--mut);font-size:11px;display:block;margin-bottom:1px}
.diff .k{color:var(--good)} .pain .k{color:var(--warn)}
.acts{display:flex;gap:6px;margin-top:10px;border-top:1px solid var(--line);padding-top:9px}
.sbtn{flex:1;text-align:center;padding:6px 4px;border-radius:8px;border:1px solid var(--line);background:var(--card2);color:var(--mut);font-size:12px;cursor:pointer;transition:.1s}
.sbtn:hover{color:var(--txt)}
.sbtn.on-save{background:var(--good);color:#08130d;border-color:var(--good);font-weight:600}
.sbtn.on-new{background:var(--acc);color:#0a1020;border-color:var(--acc);font-weight:600}
.sbtn.on-hide{background:var(--bad);color:#1a0708;border-color:var(--bad);font-weight:600}
.count-line{color:var(--mut);font-size:13px;margin:8px 2px 14px}
.empty{color:var(--mut);text-align:center;padding:40px}
mark{background:#f0b35733;color:#fbd38d;padding:0 1px;border-radius:3px}
footer{color:var(--mut);font-size:11px;text-align:center;padding:20px}
</style>
</head>
<body>
<header>
  <h1>📱 앱 아이디어 뱅크</h1>
  <div class="meta">총 <b id="total">0</b>개 · 생성 2026-07-06 17:47 · 상태는 이 브라우저에 자동 저장</div>
  <input id="q" placeholder="검색 (이름·설명·문제·차별점·근거) — 예: AI, 부모, 구독…">
  <div class="row" id="statusRow"><span class="lbl">상태</span></div>
  <div class="row" id="chips"><span class="lbl">섹션</span></div>
  <div class="row"><button class="btn" id="exp">⤓ 상태 내보내기(JSON)</button>
       <button class="btn" id="impBtn">⤒ 불러오기</button>
       <button class="btn" id="copySave">⭐ 세이브 목록 복사</button>
       <input type="file" id="imp" accept="application/json" style="display:none">
       <span class="lbl" id="savedNote"></span></div>
</header>
<main>
  <div class="count-line" id="countLine"></div>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">결과가 없습니다.</div>
</main>
<footer>로컬 단일 파일 · 상태=localStorage(ID 기준, 회차 재생성에도 유지) · 백업은 내보내기 권장</footer>
<script>
const DATA = {"entries": [{"id": "HF-001", "name": "BloodSync (혈당 식단 미러)", "sec": "HF", "desc": "연속혈당측정기(CGM) 없이도, 먹은 음식 사진만 찍으면 비슷한 음식·체질 데이터 기반으로 예상 혈당 곡선을 그려준다. 식후 \"이 조합은 스파이크 위험\"을 미리 경고. 당뇨 전단계·다이어터 타겟.", "problem": "CGM은 비싸고(월 5~10만원) 진입장벽 높음. 사람들은 \"뭘 먹으면 혈당이 튀는지\" 감만 있고 데이터가 없음.", "diff": "기기 없이 음식 사진 → 추정 혈당. 경쟁(Levels, Nutrisense)은 CGM 필수.", "pain": "\"CGM 사고 싶은데 비싸다\"는 리뷰 다수 → 무기기 추정 버전을 무료 진입점으로.", "basis": "당뇨 전단계 인구 미국 약 9,800만(CDC). CGM 시장 급성장 중이나 가격 장벽 명확."}, {"id": "HF-002", "name": "RepCoach AI (폼 교정 카메라)", "sec": "HF", "desc": "스쿼트·데드리프트 등을 폰 카메라로 비추면 실시간으로 무릎 각도·허리 정렬을 분석해 음성으로 교정. 부상 위험 동작에 즉시 경고. 홈트족 타겟.", "problem": "혼자 운동하면 폼이 틀려도 모름 → 부상. PT는 비쌈.", "diff": "영상 사후분석(많음)이 아니라 **실시간 음성 코칭**.", "pain": "\"폼 맞는지 모르겠다\" 홈트 리뷰 다수 → 실시간 피드백.", "basis": "온디바이스 포즈추정(MediaPipe) 성숙. 홈트 시장 코로나 이후 정착."}, {"id": "HF-003", "name": "Period-Aware Fit (생리주기 운동 어댑터)", "sec": "HF", "desc": "여성 생리주기 단계(난포기/황체기)에 맞춰 운동 강도·종류를 자동 조정. 황체기엔 가벼운 운동, 난포기엔 고강도 추천. 컨디션 난조 원인을 호르몬으로 설명.", "problem": "일반 운동앱은 주기를 무시 → 컨디션 안 맞는 날 무리하다 포기.", "diff": "주기-운동 연동. 일반 피트니스앱엔 없음.", "pain": "\"어떤 날은 죽어도 안 됨\" 여성 유저 페인 → 호르몬 기반 적응.", "basis": "생리주기-운동수행 상관 연구 다수(스포츠과학). 여성 피트니스 시장 성장."}, {"id": "MH-001", "name": "Spiral Out (반추사고 차단기)", "sec": "MH", "desc": "같은 걱정이 머릿속에서 도는 '반추(rumination)' 순간에 버튼 → AI가 인지왜곡 유형을 짚고 5분 분기 질문으로 사고 고리를 끊어준다. 자기 전 반추 패턴 트래킹.", "problem": "명상앱은 예방용. 정작 '지금 머리가 도는' 급성 순간엔 쓸 게 없음.", "diff": "일반 명상(Calm/Headspace) 아닌 **반추 전용 개입 도구**.", "pain": "\"밤에 생각이 멈추질 않음\" 호소 다수 → 그 순간 개입.", "basis": "반추는 우울·불안의 핵심 매개변수(임상심리 메타분석). CBT 기법 디지털화 근거 강함."}, {"id": "MH-002", "name": "Mood Weather (감정 일기 → 패턴 예보)", "sec": "MH", "desc": "하루 기분을 날씨 이모지로 기록하면, 수면·생리·날씨·일정 데이터와 교차해 \"내일 기분 저하 위험 70%\"를 예보. 트리거를 데이터로 발견.", "problem": "기분 일기는 적기만 하고 인사이트가 없음.", "diff": "단순 기록이 아닌 **예측·트리거 발견**.", "pain": "\"왜 갑자기 우울한지 모르겠다\" → 변수 상관 제시.", "basis": "기분-수면-날씨 상관 잘 알려짐. 디지털 페노타이핑 연구 흐름."}, {"id": "MH-003", "name": "Co-Regulate (커플 감정 동기화)", "sec": "MH", "desc": "커플이 각자 감정 상태를 공유하면, 상대가 지금 예민한지/지친지 위젯으로 보여줌. 싸움 전에 \"지금은 무거운 얘기 피하기\" 신호. 동의 기반 공유.", "problem": "상대 기분 모르고 잘못된 타이밍에 말 꺼내 싸움.", "diff": "개인 명상이 아닌 **2인 감정 인터페이스**.", "pain": "\"타이밍 잘못 잡아 싸웠다\" 공감 큼 → 상태 가시화.", "basis": "정서적 공동조절(co-regulation) 관계만족 연구. 커플앱 시장 존재(Paired)."}, {"id": "PR-001", "name": "Decision Log (의사결정 블랙박스)", "sec": "PR", "desc": "중요한 결정을 내릴 때 당시 근거·예상결과를 30초 기록 → 몇 달 뒤 실제결과와 자동 대조해 \"내 예측 정확도\"를 점수화. 의사결정 능력 자체를 훈련.", "problem": "사람은 과거 판단을 미화·왜곡(사후확증편향). 객관 피드백 없음.", "diff": "할일 관리가 아닌 **판단력 메타 트래킹**.", "pain": "\"내가 잘 결정하는지 모르겠다\" 1인 창업자 페인 → 정확도 측정.", "basis": "superforecasting 연구(예측 캘리브레이션 훈련 가능). 1인 결정자 증가."}, {"id": "PR-002", "name": "Friction Map (앱 방해 시간 가계부)", "sec": "PR", "desc": "어떤 앱이 '나를 빨아들였는지'를 시간·기분과 함께 시각화. 단순 사용시간이 아니라 \"그 후 기분이 나빠진\" 앱을 빨간색으로 표시해 진짜 해로운 앱 식별.", "problem": "스크린타임은 숫자만 줌. \"어떤 앱이 나를 망치는지\" 감정 연결 없음.", "diff": "사용시간+사후기분 결합. 일반 디지털웰빙 대비 인과 제시.", "pain": "\"왜 폰 보고 나면 기분 나쁘지\" → 해로운 앱 콕 집기.", "basis": "수동적 SNS 사용-기분저하 상관 연구. 디지털웰빙 관심 높음."}, {"id": "PR-003", "name": "Body-Double (집중 동반자 매칭)", "sec": "PR", "desc": "혼자 집중 못 하는 사람끼리 무음 화상으로 옆에 앉아 각자 일하는 'body doubling' 세션을 1:1 매칭. ADHD 특화. 시작 버튼 누르면 30분 동반.", "problem": "혼자선 시작·지속이 안 됨. 카페 가야만 됨.", "diff": "단체 포커스룸(Focusmate 유사)이지만 **ADHD 페인 특화 + 짧은 즉시매칭**.", "pain": "\"옆에 누가 있어야 일한다\" ADHD 호소 → 즉시 동반.", "basis": "body doubling ADHD 커뮤니티에서 검증된 비공식 기법. 수요 명확."}, {"id": "FN-001", "name": "Subscription Autopsy (구독 출혈 감시)", "sec": "FN", "desc": "카드내역에서 반복결제를 자동 탐지해 \"안 쓰는데 새는 구독\"을 색출, 1탭 해지 가이드. '유령 구독' 연간 누수액을 충격적으로 시각화.", "problem": "구독이 너무 많아 뭘 내는지도 모름. 해지가 귀찮음.", "diff": "가계부가 아닌 **구독 누수 전용 저격**.", "pain": "\"안 쓰는 구독 내고 있었다\" 후회 보편 → 색출+해지.", "basis": "평균 미국인 구독 과소추정 연구 다수. Rocket Money 등 검증된 수요."}, {"id": "FN-002", "name": "Split Karma (모임 정산 신뢰점수)", "sec": "FN", "desc": "친구 모임 더치페이를 기록하되, \"누가 늘 늦게 갚는지\" 신뢰점수를 부드럽게 가시화. 돈 얘기 꺼내기 어려운 관계의 마찰을 데이터로 중재.", "problem": "정산 후 \"받을 돈 못 받음\"이 관계 망침. 독촉이 껄끄러움.", "diff": "정산앱(Splitwise)+**사회적 신뢰 레이어**.", "pain": "\"갚으라 말하기 민망\" → 앱이 대신 리마인드.", "basis": "친구 간 금전 마찰 보편. 정산앱 시장 성숙했으나 신뢰 레이어 공백."}, {"id": "ED-001", "name": "Forget-Proof (망각곡선 역설계)", "sec": "ED", "desc": "배운 것(강의·책·영상)을 한 줄 입력하면, 에빙하우스 망각곡선에 맞춰 \"지금 복습 안 하면 잊는다\"를 알림. AI가 능동회상 퀴즈를 자동 생성.", "problem": "배운 건 많은데 다 까먹음. 복습 타이밍을 놓침.", "diff": "플래시카드(Anki) 진입장벽 제거 + **AI 자동 퀴즈화**.", "pain": "\"강의 듣고 다 까먹음\" 보편 → 자동 복습 스케줄.", "basis": "간격반복·능동회상 학습효과 메타분석 강함(A급 근거)."}, {"id": "ED-002", "name": "Accent Mirror (모국어 간섭 발음 교정)", "sec": "ED", "desc": "영어 학습자의 모국어(한/일/중 등)별로 '잘 틀리는 발음'을 집중 진단. 내 모국어 화자가 흔히 틀리는 R/L, th 등을 AI가 콕 집어 반복 훈련.", "problem": "일반 발음앱은 모국어 간섭 패턴을 무시.", "diff": "**L1별 오류 특화** 진단. 범용 발음앱 대비 정밀.", "pain": "\"내가 어디서 틀리는지 모름\" → 모국어별 약점 집중.", "basis": "L1 transfer 음운론 잘 정립. 영어학습 거대시장."}, {"id": "SC-001", "name": "Build-in-Public Feed (1인 개발자 빌드로그 SNS)", "sec": "SC", "desc": "혼자 앱 만드는 사람들이 일일 빌드 진척·지표·실패를 짧게 공유하는 전용 피드. 일반 SNS의 잡음 없이 '만드는 사람들'만의 커뮤니티. 출시 카운트다운·MRR 배지.", "problem": "트위터/스레드는 잡음 많고 인디 빌더 신호가 묻힘.", "diff": "범용 SNS가 아닌 **빌더 전용 + 지표 네이티브**.", "pain": "\"빌드로그 올릴 데가 마땅찮다\"(질문자 본인 페인 직결) → 전용 공간.", "basis": "indie hacker·build in public 문화 확산. 니치 커뮤니티 수요."}, {"id": "SC-002", "name": "Local Skill Swap (동네 재능 물물교환)", "sec": "SC", "desc": "돈 대신 재능으로 거래하는 동네 단위 앱. \"기타 1시간↔수학과외 1시간\". 신뢰는 동네 인증+상호평가로. 현금 없는 호혜 경제.", "problem": "가진 재능은 있는데 현금화 어렵고, 작은 도움 구하기 애매.", "diff": "일반 중고거래 아닌 **재능 시간 교환**.", "pain": "\"소소한 도움 부탁할 데 없다\" → 동네 호혜 매칭.", "basis": "타임뱅킹 모델 검증 사례 존재. 로컬 커뮤니티 회복 트렌드."}, {"id": "HC-001", "name": "Plot Hole Hunter (소설 설정 모순 탐지)", "sec": "HC", "desc": "웹소설·아마추어 작가가 원고를 넣으면 AI가 인물 눈색·타임라인·설정 모순을 자동 색출. \"3화에선 파란 눈, 17화엔 갈색\"을 잡아줌.", "problem": "장편 쓰다 설정 까먹고 모순 발생 → 독자 이탈.", "diff": "맞춤법(많음) 아닌 **서사 일관성 검수**.", "pain": "\"긴 글 쓰다 설정 꼬임\" 작가 페인 → 모순 자동 추적.", "basis": "웹소설·자가출판 폭증. AI 장문 일관성 분석 가능해짐."}, {"id": "HC-002", "name": "Riff Capture (흥얼거림 → 악보)", "sec": "HC", "desc": "떠오른 멜로디를 흥얼거리면 즉시 코드·악보·미디로 변환해 저장. 작곡 아이디어 휘발 방지. 비슷한 기존곡 표절 위험도 경고.", "problem": "좋은 멜로디 떠올라도 기록 못 해 날아감.", "diff": "녹음(많음) 아닌 **즉시 악보화 + 표절 체크**.", "pain": "\"멜로디 떠올랐다 까먹음\" 작곡가 페인 → 즉시 채보.", "basis": "음원 채보 AI 성숙. 아마추어 작곡 인구 큼."}, {"id": "FD-001", "name": "Fridge Rescue (냉장고 잔여 레시피)", "sec": "FD", "desc": "냉장고 속 재료를 사진/입력하면 그것만으로 만들 수 있는 레시피 추천. 유통기한 임박 재료 우선 소진. 장보기 전 '있는 걸로 먼저' 유도해 음식 낭비·돈 절약.", "problem": "재료 남아 썩힘 + 매번 새로 장봄.", "diff": "레시피검색(많음) 아닌 **잔여재료 역방향 + 유통기한 우선순위**.", "pain": "\"재료 남아 버린다\" 보편 → 소진 중심 추천.", "basis": "가정 음식물쓰레기 비용 큼(환경·돈). AI 재료-레시피 매칭 성숙."}, {"id": "FD-002", "name": "Allergy Decode (외식 메뉴 알레르기 스캐너)", "sec": "FD", "desc": "식당 메뉴판을 찍으면 내 알레르기·식이제한(글루텐/견과/비건)에 걸리는 항목을 빨갛게 표시. 외국 여행 시 현지어 메뉴도 번역+필터.", "problem": "외식·해외에서 뭘 먹어도 되는지 매번 불안.", "diff": "일반 번역 아닌 **알레르기 교차 필터**.", "pain": "\"해외서 알레르기 때문에 못 먹음\" → 메뉴 스캔 안심.", "basis": "식품 알레르기 인구 상당. OCR+번역+필터 결합 신선."}, {"id": "TR-001", "name": "Layover Optimizer (경유 시간 도심 탈출)", "sec": "TR", "desc": "긴 경유시간(5h+)에 공항 밖 도심을 다녀올 수 있는지 입국요건·이동시간·짐 보관까지 계산해 \"나갈 수 있다/없다 + 추천 코스\"를 알려줌.", "problem": "경유 시간 아까운데 나가도 되는지·시간 되는지 계산 복잡.", "diff": "항공검색 아닌 **경유 틈새 마이크로 여행 설계**.", "pain": "\"경유 8시간 공항서 멍\" 후회 → 도심 탈출 플랜.", "basis": "환승 허브 여행객 다수. 비자/이동 데이터 API화 가능."}, {"id": "TR-002", "name": "Quiet Spots (혼잡도 역추천 지도)", "sec": "TR", "desc": "관광지·카페의 실시간/요일별 혼잡도를 보고 '한산한 곳·시간'을 역추천. 사람 많은 곳 싫어하는 내향인·사진 깔끔하게 찍고 싶은 사람 타겟.", "problem": "가면 사람 너무 많아 망침. 한산한 대안을 모름.", "diff": "인기순(많음) 반대인 **한산함 최적화**.", "pain": "\"사람 많아 별로였다\" 리뷰 흔함 → 조용한 대안.", "basis": "혼잡도 데이터(구글) 존재. 내향인·오버투어리즘 반감 트렌드."}, {"id": "PF-001", "name": "Why Crying (아기 울음 패턴 해석)", "sec": "PF", "desc": "아기 울음을 녹음하면 배고픔/졸림/불편 등 가능성을 추정하고, 우리 아기만의 울음-원인 패턴을 학습해 정확도를 올린다. 초보 부모 새벽 패닉 완화.", "problem": "왜 우는지 몰라 초보 부모가 무력감·불안.", "diff": "범용 육아앱 아닌 **개별 아기 울음 학습**.", "pain": "\"왜 우는지 몰라 미치겠다\" 신생아 부모 → 추정+학습.", "basis": "울음 음향분류 연구 존재. 신생아 부모 고통점 명확(근거는 보조 도구로 한정 표기 필요)."}, {"id": "PF-002", "name": "Grandparent Bridge (조부모-손주 원격 놀이)", "sec": "PF", "desc": "멀리 사는 조부모와 손주가 함께 할 수 있는 가이드형 원격 활동(같이 그림·동화 읽기·게임)을 영상통화 위에 얹어줌. 어색한 침묵 대신 할 거리 제공.", "problem": "영상통화 켜도 \"밥 먹었니\" 뒤 할 말 없어 끊음.", "diff": "일반 영상통화 아닌 **세대 간 활동 스캐폴딩**.", "pain": "\"통화해도 어색하다\" → 함께할 활동 제공.", "basis": "원거리 가족 증가. 세대 연결 정서적 수요."}, {"id": "PT-001", "name": "Vet-or-Wait (증상 트리아지)", "sec": "PT", "desc": "반려동물 증상을 입력하면 \"지금 병원 직행 / 24h 관찰 / 집에서 케어\" 긴급도를 안내. 불필요한 야간 응급실 비용과 골든타임 놓침을 동시에 줄임.", "problem": "한밤 증상에 병원 가야 할지 몰라 불안·과잉지출.", "diff": "정보검색 아닌 **긴급도 트리아지** (진단 아님 명시).", "pain": "\"새벽에 토하는데 응급인지 모름\" → 긴급도 안내.", "basis": "반려 인구 급증, 야간 응급 비용 부담 큼. (수의 진단 대체 아님 — 법적 면책 필요.)"}, {"id": "PT-002", "name": "Multi-Cat Feeder Log (다묘 급여 분쟁 기록)", "sec": "PT", "desc": "여러 마리 키울 때 누가 얼마나 먹었는지·약 먹었는지 가족이 공유 기록. \"내가 줬나?\" 중복급여·투약 누락 방지.", "problem": "여러 사람·여러 마리면 급여/투약 혼선.", "diff": "일반 펫케어 아닌 **다묘·다인 공유 로그 특화**.", "pain": "\"약 줬는지 헷갈림\" 다묘 가구 → 공유 체크.", "basis": "다묘 가구 증가. 단순하지만 명확한 페인."}, {"id": "WK-001", "name": "Brag Log (성과 자동 수집기)", "sec": "WK", "desc": "평소 한 일을 슬랙/캘린더/커밋에서 자동 수집해 연봉협상·평가 시즌에 \"내가 한 일\" 근거를 정리해줌. 겸손해서 자기 성과를 못 챙기는 직장인 타겟.", "problem": "평가 때 1년간 뭐 했는지 기억 안 나 손해.", "diff": "할일관리 아닌 **성과 회고·협상 무기화**.", "pain": "\"평가 때 어필 못 함\" 보편 → 자동 누적.", "basis": "brag document 문화 IT업계 확산. 자동수집 통합 가능."}, {"id": "WK-002", "name": "Meeting Tax (회의 비용 가시화)", "sec": "WK", "desc": "회의 참석자 연봉을 익명 추정해 \"이 1시간 회의 = $1,200 소모\"를 실시간 표시. 무의미한 회의를 줄이도록 조직 행동 변화 유도.", "problem": "회의가 너무 많고 비용 인식이 없음.", "diff": "일정관리 아닌 **회의 비용 행동경제 넛지**.", "pain": "\"회의 너무 많다\" 보편 불만 → 비용 충격 가시화.", "basis": "회의 과잉 생산성 손실 연구 다수. 넛지 효과 기대."}, {"id": "AI-001", "name": "Tone Translator (관계별 말투 변환)", "sec": "AI", "desc": "쓴 메시지를 상대(상사/고객/연인/부모)에 맞는 톤으로 즉시 변환. \"화났을 때 보내기 전\" 한 번 걸러주는 안전장치. 후회할 메시지 방지.", "problem": "감정적으로 보낸 메시지로 관계·일 망침.", "diff": "범용 AI작문 아닌 **관계맥락 톤 + 충동 차단**.", "pain": "\"욱해서 보낸 거 후회\" 보편 → 전송 전 순화.", "basis": "LLM 톤 변환 강점. 메신저 일상화로 수요 큼."}, {"id": "AI-002", "name": "Doc Interrogator (계약서/약관 심문관)", "sec": "AI", "desc": "계약서·임대차·약관을 넣으면 \"나에게 불리한 독소조항\"만 빨갛게 뽑아 쉬운 말로 설명하고, 협상 포인트를 제안. 법률 무지 격차 해소.", "problem": "긴 계약서 안 읽고 사인 → 나중에 당함.", "diff": "요약(많음) 아닌 **불리조항 저격 + 협상안**.", "pain": "\"약관 안 읽고 당했다\" 보편 → 위험조항 경고.", " 부 아닌 **가전 유지보수 타임라인**.", "pain": "\"보증 끝난 줄도 몰랐다\" → 만료 전 알림.", "basis": "유지보수 방치로 인한 비용 손실."}, {"id": "HM-002", "name": "Plant Doctor (식물 진단)", "sec": "HM", "desc": "시든 식물 사진을 찍으면 병해충·과습·광부족 등 원인을 진단하고 종별 케어를 안내. 왜 죽는지 몰라 식물을 계속 죽이는 초보 식집사용.", "problem": "식물이 왜 죽는지 몰라 반복 실패.", "diff": "물주기 알림 아닌 **사진 기반 진단**.", "pain": "\"키우는 족족 죽는다\" → 원인 진단.", "basis": "식집사(플랜테리어) 인구 증가."}, {"id": "HM-003", "name": "Declutter Sprint (정리 챌린지)", "sec": "HM", "desc": "매일 한 구역만 비우는 챌린지로 정리를 잘게 쪼개고, 버린 물건을 기록·기부처에 연계. 엄두 안 나는 정리를 행동으로 만든다.", "problem": "집 정리가 막막해 손도 못 댐.", "diff": "정리법 콘텐츠 아닌 **행동 챌린지 + 기부 연계**.", "pain": "\"어디서부터 치울지 막막\" → 하루 한 구역.", "basis": "미니멀리즘·행동 분할 효과."}, {"id": "DT-001", "name": "Date Engine (데이트 코스 생성)", "sec": "DT", "desc": "두 사람의 취향·예산·날씨로 데이트 코스를 생성. 매번 같은 데이트로 권태가 오는 커플에게 새로운 활동을 제안.", "problem": "맨날 같은 데이트로 매너리즘.", "diff": "매칭앱 아닌 **'사귄 후' 데이트 기획**.", "pain": "\"맨날 똑같이 만난다\" → 취향 기반 코스.", "basis": "권태기·관계 활성화 수요."}, {"id": "DT-002", "name": "Pattern Journal (내 연애패턴 분석)", "sec": "DT", "desc": "데이팅 상대별 메모를 쌓아 반복되는 내 연애 패턴(끌리는 유형·반복 실수)을 분석. 같은 실패를 되풀이하지 않게 자기 인식을 돕는다.", "problem": "비슷한 사람에게 끌려 같은 실수 반복.", "diff": "매칭 아닌 **자기 연애패턴 인식**.", "pain": "\"왜 늘 비슷하게 망하지\" → 패턴 시각화.", "basis": "애착·관계 패턴 자각의 효과."}, {"id": "DT-003", "name": "LDR Sync (장거리 함께함)", "sec": "DT", "desc": "장거리 커플의 시차를 맞춰 같이 영화·게임·식사 같은 동시 활동을 스케줄링. 메시지만 주고받는 단조로움을 '함께하는 시간'으로 채운다.", "problem": "장거리라 함께하는 경험이 부족해 멀어짐.", "diff": "메신저 아닌 **동시 활동 설계**.", "pain": "\"연락만 하니 멀어진다\" → 함께할 활동.", "basis": "장거리 관계 유지의 어려움."}, {"id": "HF-007", "name": "Med Tracker Smart (복약 상호작용 체크)", "sec": "HF", "desc": "약을 사진/음성으로 간편 기록하고 복용 누락·중복을 경고하며 약물 간 상호작용 위험까지 점검. 가족과 공유해 보호자가 함께 챙김.", "problem": "여러 약을 먹으면 복용 여부·상호작용을 놓침.", "diff": "단순 알람 아닌 **상호작용 체크 + 가족 공유**.", "pain": "\"약 먹었는지 헷갈린다\" → 기록+상호작용 경고.", "basis": "복약 순응 저하·다제 복용 위험."}, {"id": "HF-008", "name": "Cold Protocol (한랭요법 타이머)", "sec": "HF", "desc": "냉수샤워·사우나의 노출 시간 프로토콜을 안내하고 체감 적응을 추적. 막연히 하던 한랭요법을 체계적 루틴으로.", "problem": "얼마나·어떻게 해야 효과적인지 모름.", "diff": "일반 타이머 아닌 **한랭노출 프로토콜 특화**.", "pain": "\"냉수욕 제대로 하는지 모름\" → 프로토콜 가이드.", "basis": "한랭노출·회복 관심 증가."}, {"id": "MH-007", "name": "Worry Window (걱정 미루기 훈련)", "sec": "MH", "desc": "떠오른 걱정을 정해진 '걱정 시간'에만 다루도록 미루기 훈련(CBT). 종일 불안에 끌려다니지 않고 걱정을 시간박싱.", "problem": "하루 종일 걱정이 새어나와 일상이 마비.", "diff": "명상 아닌 **걱정 시간박싱(worry postponement)**.", "pain": "\"온종일 불안하다\" → 걱정 시간으로 미루기.", "basis": "worry postponement CBT 기법."}, {"id": "MH-008", "name": "Self-Compassion (자기연민 코치)", "sec": "MH", "desc": "자기비난이 올라온 순간, 자책 문장을 자기연민 표현으로 재구성하도록 돕는다. 긍정확언이 아니라 스스로를 친구처럼 대하는 훈련.", "problem": "실수 때마다 가혹한 자책으로 무너짐.", "diff": "긍정확언 아닌 **자기연민(self-compassion) 특화**.", "pain": "\"자책이 심하다\" → 자기연민 재구성.", "basis": "self-compassion-정신건강 연구."}, {"id": "PR-007", "name": "Two-Minute Starter (착수 마찰 제거)", "sec": "PR", "desc": "미루는 일을 '2분 버전'으로 쪼개 시작 버튼만 누르게 한다. 시작이 안 되는 일을 작게 만들어 관성을 깬다.", "problem": "일을 시작하는 것 자체가 안 됨.", "diff": "할일 목록 아닌 **착수 마찰 제거(2분 규칙)**.", "pain": "\"시작을 못 한다\" → 2분짜리로 분해.", "basis": "행동 활성화·2분 규칙."}, {"id": "PR-008", "name": "Context Resume (작업 재개 스냅샷)", "sec": "PR", "desc": "작업을 중단할 때 '어디까지 했는지·다음 할 일'을 스냅샷으로 남겨 복귀 시 1초 만에 흐름을 복원. 다시 앉으면 멍해지는 문제 해결.", "problem": "중단 후 복귀하면 맥락을 잃고 헤맴.", "diff": "일반 메모 아닌 **작업 재개 특화 스냅샷**.", "pain": "\"다시 앉으면 흐름 끊김\" → 재개 스냅샷.", "basis": "작업 재개(resumption)의 인지 비용."}, {"id": "FN-006", "name": "Bill Negotiator (청구서 협상)", "sec": "FN", "desc": "통신·보험·구독 청구서를 분석해 인하 가능액과 협상 스크립트를 제시. 비싼 줄 알면서 귀찮아 못 하던 요금 협상을 도와준다.", "problem": "요금이 비싼데 협상이 번거로워 방치.", "diff": "가계부 아닌 **청구 협상 도구**.", "pain": "\"요금 비싼데 협상 귀찮다\" → 스크립트 제공.", "basis": "청구 협상으로 실제 절감 가능."}, {"id": "FN-007", "name": "Impulse Pause (충동구매 지연)", "sec": "FN", "desc": "충동구매 직전 24시간 대기열에 넣고, 그때도 원하면 사게 한다. 사고 후회하는 패턴을 '지연'으로 끊는다.", "problem": "충동구매 후 후회·낭비.", "diff": "가계부 아닌 **충동 지연 장치**.", "pain": "\"지르고 후회한다\" → 24h 대기.", "basis": "지연이 충동구매를 감소시킴."}, {"id": "ED-006", "name": "Lecture Q (강의 이해도 질문)", "sec": "ED", "desc": "강의 영상·PDF에서 이해도 점검 질문을 자동 생성하고 오답으로 약점을 짚는다. 들었는데 이해했는지 모르는 상태를 능동회상으로 검증.", "problem": "수동적으로 듣고 이해 여부를 모름.", "diff": "요약 아닌 **능동회상 문제 생성**.", "pain": "\"들었는데 남는 게 없다\" → 자동 퀴즈.", "basis": "능동회상의 학습 효과."}, {"id": "ED-007", "name": "Shadowing (쉐도잉 발음)", "sec": "ED", "desc": "원어민 영상에 0.5초 지연으로 따라 말하는 쉐도잉을 안내하고 발음·억양을 채점. 듣기는 되는데 입이 안 떨어지는 문제 공략.", "problem": "이해는 되는데 말이 안 나옴.", "diff": "단어암기 아닌 **쉐도잉 특화 + 채점**.", "pain": "\"말이 안 나온다\" → 쉐도잉 훈련.", "basis": "쉐도잉의 발화 유창성 효과."}, {"id": "SC-006", "name": "Micro Mentor (5분 단발 멘토링)", "sec": "SC", "desc": "지금 막힌 특정 문제만 5분 단발로 풀어줄 멘토를 즉시 매칭. 장기 멘토십이 부담스러운 작은 질문에 적합.", "problem": "작은 질문 하나에 멘토 구하기가 과하다.", "diff": "장기 멘토 아닌 **단발 문제해결 매칭**.", "pain": "\"이거 하나만 물어보고 싶다\" → 5분 매칭.", "basis": "마이크로 멘토링 수요."}, {"id": "SC-007", "name": "Tiny Meetup (동네 번개)", "sec": "SC", "desc": "동네에서 보드게임·러닝 같은 소규모 즉흥 모임을 번개로 연결. 대형 이벤트가 아닌 가벼운 동네 만남.", "problem": "주말에 같이 놀 사람이 없어 혼자 무료.", "diff": "대형 이벤트 아닌 **동네 마이크로 모임**.", "pain": "\"주말에 같이 할 사람 없다\" → 동네 번개.", "basis": "로컬 오프라인 연결 수요."}, {"id": "HC-006", "name": "Relay Story (이어쓰기 릴레이)", "sec": "HC", "desc": "매일 한 문단씩 이어 쓰는 릴레이 소설 커뮤니티. 혼자 쓰면 지속이 안 되는 창작을 협업의 재미로 유지.", "problem": "혼자 글쓰기는 동기가 끊겨 중단.", "diff": "단독 집필 아닌 **협업 릴레이 창작**.", "pain": "\"혼자 쓰면 못 이어간다\" → 릴레이.", "basis": "협업 창작의 지속 동기."}, {"id": "HC-007", "name": "Recipe Remix (레시피 창작 변형)", "sec": "HC", "desc": "평소 만들던 레시피를 재료·기법을 바꿔 창의적으로 업그레이드해준다(잔여재료 소진이 아닌 '내 요리 변주'). 늘 똑같은 메뉴에 새로움을 더함.", "problem": "할 줄 아는 요리가 늘 똑같아 지루함.", "diff": "FD-001(잔여재료)과 달리 **기존 레시피 창의 변형**.", "pain": "\"맨날 같은 요리뿐\" → 변주 제안.", "basis": "요리 창의·다양성 욕구."}, {"id": "FD-006", "name": "Portion Coach (분량 코칭)", "sec": "FD", "desc": "외식·배달 음식의 적정 1인분과 '남길 양'을 안내해 과식을 막는다. 시키면 다 먹어버리는 분량 단서 부재를 보완.", "problem": "외식·배달 시 양 조절 실패로 과식.", "diff": "칼로리 계산 아닌 **분량 코칭**.", "pain": "\"시키면 다 먹게 된다\" → 적정량 가이드.", "basis": "분량 단서가 섭취량에 큰 영향."}, {"id": "FD-007", "name": "Dietary Card (식이제한 소통 카드)", "sec": "FD", "desc": "알레르기·비건 등 식이제한을 현지어 카드로 만들어 식당에 보여줄 수 있게 한다(스캔이 아닌 '내 제한을 표현'). 해외 외식 소통 해결.", "problem": "해외 식당에 내 제한을 설명하기 어려움.", "diff": "FD-002(메뉴 스캔)와 달리 **내 제한 표현 카드**.", "pain": "\"제한 설명이 안 통한다\" → 현지어 카드.", "basis": "알레르기·비건 여행 소통 수요."}, {"id": "TR-006", "name": "Trip Debrief (여행 회고)", "sec": "TR", "desc": "여행 후 좋았던 곳·실수·낭비를 기록해 다음 여행 계획에 자동 반영. 매번 같은 실수를 반복하지 않게.", "problem": "여행 노하우가 휘발돼 매번 처음부터.", "diff": "계획앱 아닌 **사후 회고 → 다음 반영**.", "pain": "\"갈 때마다 같은 실수\" → 회고 누적.", "basis": "회고 기반 학습."}, {"id": "TR-007", "name": "Micro Adventure (로컬 탐험 미션)", "sec": "TR", "desc": "집 근처 안 가본 곳을 미션형으로 탐험하게 하는 주말 마이크로어드벤처. 멀리 못 가도 일상에 새로움을 만든다.", "problem": "시간·돈 없어 여행 못 가 권태.", "diff": "해외여행 아닌 **로컬 마이크로어드벤처 미션**.", "pain": "\"멀리 못 가도 새롭고 싶다\" → 동네 미션.", "basis": "마이크로어드벤처 트렌드."}, {"id": "PF-006", "name": "Kids First Aid (영유아 응급 가이드)", "sec": "PF", "desc": "아이 발열·화상·이물질 등 응급상황별 즉시 대처를 단계별로 안내. 다급한 순간 검색 대신 바로 행동하도록(의료 면책).", "problem": "응급 시 뭘 해야 할지 몰라 패닉.", "diff": "일반 의료정보 아닌 **영유아 응급 즉시 가이드**.", "pain": "\"급할 때 머리가 하얘진다\" → 단계별 대처.", "basis": "부모 응급대처 불안(의료 대체 아님)."}, {"id": "PF-007", "name": "Milestone Tracker (발달 이정표)", "sec": "PF", "desc": "월령별 발달 이정표를 체크하고 지연 신호를 조기에 안내. 정상 발달인지 막연히 불안한 부모에게 기준 제시(의료 면책).", "problem": "발달이 정상 범위인지 알 수 없어 불안.", "diff": "사진앨범 아닌 **발달 추적·지연 조기 안내**.", "pain": "\"잘 크고 있는 건지 불안\" → 이정표 체크.", "basis": "조기 개입의 중요성(진단 아님)."}, {"id": "PT-006", "name": "Pet Sit Swap (이웃 돌봄 교환)", "sec": "PT", "desc": "이웃끼리 휴가 때 서로 반려동물을 맡아주는 호혜 돌봄을 신뢰 평가와 함께 매칭. 비싼 유료 시터 대신 믿을 이웃.", "problem": "여행 시 맡길 데가 없고 시터는 비쌈.", "diff": "유료 시터 아닌 **이웃 호혜 교환 + 신뢰**.", "pain": "\"여행 때 맡길 데 없다\" → 이웃 매칭.", "basis": "펫시팅 비용·신뢰 문제."}, {"id": "PT-007", "name": "Separation Log (분리불안 행동 로그)", "sec": "PT", "desc": "짖음·파괴 행동 등을 기록해 분리불안·스트레스 패턴을 추적하고 개선을 코칭. 과장된 '번역'이 아닌 행동 데이터 기반.", "problem": "외출 시 무슨 일이 있는지·왜 그러는지 모름.", "diff": "울음 번역 과장 아닌 **행동 패턴 로그**.", "pain": "\"분리불안인지 모르겠다\" → 패턴 추적.", "basis": "행동 관찰 기반 개입."}, {"id": "WK-006", "name": "Personal CRM (네트워킹 기억)", "sec": "WK", "desc": "만난 사람·맥락·다음 할 일을 가볍게 기록하고 적절한 때 연락하라고 리마인드. 명함만 쌓이고 끊기는 관계를 살린다.", "problem": "네트워킹 후 후속이 없어 관계가 사라짐.", "diff": "영업 CRM 아닌 **개인 네트워킹 특화 경량 CRM**.", "pain": "\"명함만 쌓이고 연락 끊김\" → 관계 리마인드.", "basis": "약한 연결(weak ties)의 커리어 가치."}, {"id": "WK-007", "name": "Skill Gap Map (직무 역산 학습)", "sec": "WK", "desc": "목표 직무 채용공고를 분석해 내게 부족한 스킬과 학습 경로를 제시. 막연히 '뭘 배워야 하나'를 데이터로 좁힌다.", "problem": "커리어 목표 대비 무엇을 배워야 할지 막막.", "diff": "강의 추천 아닌 **목표 직무 역산 갭 분석**.", "pain": "\"뭘 공부해야 할지 모름\" → 공고 기반 갭.", "basis": "채용공고 스킬 요구 데이터화 가능."}, {"id": "AI-006", "name": "Meeting Action (회의 액션 추출)", "sec": "AI", "desc": "회의 녹음에서 결정사항·할일·담당자를 자동 추출해 배분. 단순 전사가 아니라 '누가 무엇을 언제'까지 정리.", "problem": "회의 후 결정·할일이 흐지부지됨.", "diff": "전사 아닌 **액션 추출·담당 배정**.", "pain": "\"회의 끝나면 누가 뭐할지 흐림\" → 액션 정리.", "basis": "STT + 구조화 추출 실용화."}, {"id": "AI-007", "name": "Reply Drafts (답장 초안 대기)", "sec": "AI", "desc": "받은 메일에 내 말투로 답장 초안을 자동 생성해 대기열에 둔다(자동 발송 아님). 답장 쓰기 귀찮아 밀리는 메일을 줄임.", "problem": "답장 작성이 부담돼 메일이 쌓임.", "diff": "자동 발송 아닌 **내 톤 초안 + 검토 대기**.", "pain": "\"답장 쓰기 귀찮아 밀린다\" → 초안 제공.", "basis": "LLM 개인화 작문."}, {"id": "NC-007", "name": "ADHD Externalize (실행기능 외재화)", "sec": "NC", "desc": "ADHD 사용자를 위해 할일을 시각·타이머·즉시보상으로 외재화하고 '시간맹'을 보완. 일반 할일앱이 안 맞는 인지특성에 맞춤 설계.", "problem": "일반 생산성앱이 ADHD에 안 맞아 실패.", "diff": "범용 할일 아닌 **ADHD 실행기능 보조 설계**.", "pain": "\"시간 감각·착수가 안 된다\" → 외재화 도구.", "basis": "ADHD 실행기능 결핍 보조."}, {"id": "NC-008", "name": "Veteran Bridge (전역자 전환)", "sec": "NC", "desc": "군 전역자에게 군 경력을 민간 직무로 번역하고 복지·커뮤니티 전환을 안내. 민간 적응이 막막한 시기를 길잡이.", "problem": "전역 후 민간 사회 적응이 막막.", "diff": "일반 취업 아닌 **전역 전환 특화**.", "pain": "\"민간 어디서 시작할지 모름\" → 전환 로드맵.", "basis": "전역자 사회 재진입의 어려움."}, {"id": "FW-006", "name": "Daily Examen (성찰 가이드)", "sec": "FW", "desc": "하루를 돌아보는 영성수련(examen)을 단계별로 안내하고 감사·회개를 기록. 막연한 일기가 아닌 구조화된 영적 성찰(교파 전통 표기).", "problem": "영적 성찰 습관을 혼자 잡기 어려움.", "diff": "일반 일기 아닌 **examen 영성수련 구조**.", "pain": "\"돌아보는 습관이 안 든다\" → 가이드 성찰.", "basis": "examen 전통(이그나티우스 영성)."}, {"id": "FW-007", "name": "Small Group Tools (소그룹 운영)", "sec": "FW", "desc": "교회 소그룹/구역모임의 나눔 질문·기도제목·출석·공지를 한곳에서 운영. 흩어진 단톡 대신 사역 특화 도구.", "problem": "소그룹 운영이 단톡으로 흩어져 번거로움.", "diff ain": "\"이걸 뭘로 대체하지\" → 비건 대체재.", "basis": "비건·플렉시테리언 전환 수요."}, {"id": "VEG-003", "name": "Hidden Animal (숨은 동물성 성분)", "sec": "VEG", "desc": "가공식품의 숨은 동물성 성분(젤라틴·유청 등)을 스캔으로 가려낸다. 모르고 먹게 되는 비건 위반을 막는다.", "problem": "가공식품의 숨은 동물성 성분을 모르고 먹음.", "diff": "일반 성분 아닌 **비건 적합성 판별 특화**.", "pain": "\"이거 비건 맞나?\" → 성분 스캔.", "basis": "비건 라벨 판별 수요."}, {"id": "RUN-001", "name": "Start to Run (러닝 입문)", "sec": "RUN", "desc": "걷기에서 달리기로 점진 전환하는 초보 러닝 프로그램(C25K식)을 제공한다. 뛰면 금방 지쳐 포기하던 사람을 완주로 이끈다.", "problem": "달리면 금방 지쳐 러닝을 포기.", "diff": "일반 운동 아닌 **러닝 점진 입문 특화**.", "pain": "\"뛰면 금방 숨차다\" → 점진 프로그램.", "basis": "Couch to 5K 등 입문 수요."}, {"id": "RUN-002", "name": "Pace Plan (페이스·훈련 계획)", "sec": "RUN", "desc": "목표 기록에 맞춘 페이스와 인터벌·롱런 훈련 계획을 짜준다. 무작정 뛰기만 하다 정체되던 기록을 체계적으로 끌어올린다.", "problem": "어떻게 훈련해야 빨라지는지 모름.", "diff": "SP-005(대회 준비)와 달리 **일상 러닝 훈련 특화**.", "pain": "\"기록이 안 는다\" → 페이스·훈련 계획.", "basis": "러닝 훈련·기록 향상."}, {"id": "RUN-003", "name": "Run Form (러닝 자세)", "sec": "RUN", "desc": "케이던스·착지 등 러닝 자세를 분석해 부상을 예방한다. 뛸 때마다 무릎·정강이가 아프던 원인을 폼에서 찾는다.", "problem": "달리면 무릎·정강이가 아파 못 함.", "diff": "SP-006(prehab)과 달리 **러닝 폼 분석 특화**.", "pain": "\"뛰면 아프다\" → 폼 분석·교정.", "basis": "러닝 부상 예방."}, {"id": "HF-035", "name": "Balance Train (균형·낙상 예방)", "sec": "HF", "desc": "노인·재활 대상의 균형 운동으로 낙상을 예방한다. 넘어질까 불안해 활동을 줄이던 사람을 안전하게 다시 움직이게 한다.", "problem": "균형이 약해 낙상이 두렵고 활동이 위축됨.", "diff": "일반 운동 아닌 **균형·낙상 예방 특화**.", "pain": "\"넘어질까 불안하다\" → 균형 운동.", "basis": "노인 낙상 예방의 중요성."}, {"id": "MH-035", "name": "Call Calm (통화 불안 대처)", "sec": "MH", "desc": "전화 통화가 두려운 통화 공포(telephobia)에 대처법과 상황별 스크립트를 제공한다. 전화를 미루다 일을 그르치던 부담을 줄인다.", "problem": "전화 통화가 두려워 미루고 회피.", "diff": "일반 불안 아닌 **통화 공포 특화**.", "pain": "\"전화가 너무 무섭다\" → 대처·스크립트.", "basis": "통화 불안(telephobia) 증가."}, {"id": "CHM-001", "name": "Emotion Coach (감정 코칭)", "sec": "CHM", "desc": "아이의 감정을 명명하고 조절하도록 돕는 감정 코칭을 부모에게 가이드한다. 떼·감정 폭발 앞에서 어쩔 줄 모르던 부모를 돕는다.", "problem": "아이의 감정 폭발에 어떻게 대응할지 모름.", "diff": "일반 육아 아닌 **아동 정서 코칭 특화**.", "pain": "\"아이 떼에 어쩔 줄 모른다\" → 감   c.onclick=()=>{activeSec=(activeSec===s.code?null:s.code);rerender();};chips.appendChild(c);});

function syncChips(){
  [...statusRow.querySelectorAll('.chip')].forEach(ch=>ch.classList.toggle('on',ch.dataset.k===activeStatus));
  [...chips.querySelectorAll('.chip')].forEach(ch=>{
    if(ch.dataset.code==='')ch.classList.toggle('on',!activeSec);
    else ch.classList.toggle('on',ch.dataset.code===activeSec);});
  const c=stCounts();
  document.querySelector('.sc-save').textContent=c.save;
  document.querySelector('.sc-new').textContent=c.new;
  document.querySelector('.sc-hide').textContent=c.hide;
  document.querySelector('.sc-all')&&(document.querySelector('.sc-all').textContent='');
}

function card(e,term){const st=getSt(e.id);const d=document.createElement('div');
  d.className='card'+(st==='save'?' st-save':st==='hide'?' st-hide':'');
  d.innerHTML=`<span class="id">${esc(e.id)}</span>
   <div class="nm">${hl(e.name,term)}</div>
   <div class="f"><span class="k">설명</span>${hl(e.desc,term)}</div>
   <div class="f"><span class="k">해결 문제</span>${hl(e.problem,term)}</div>
   <div class="f diff"><span class="k">차별점</span>${hl(e.diff,term)}</div>
   <div class="f pain"><span class="k">유저 불편→추천</span>${hl(e.pain,term)}</div>
   <div class="f"><span class="k">근거</span>${hl(e.basis,term)}</div>
   <div class="acts">
     <div class="sbtn ${st==='save'?'on-save':''}" data-s="save">⭐ 세이브</div>
     <div class="sbtn ${st==='new'?'on-new':''}" data-s="new">🆕 리뷰안함</div>
     <div class="sbtn ${st==='hide'?'on-hide':''}" data-s="hide">🚫 숨김</div>
   </div>`;
  d.querySelectorAll('.sbtn').forEach(b=>b.onclick=()=>setSt(e.id,b.dataset.s));
  return d;}

function rerender(){const term=q.value.trim(),t=term.toLowerCase();
  let list=DATA.entries.filter(e=>{const st=getSt(e.id);
    if(activeStatus==='all')return st!=='hide';
    return st===activeStatus;});
  if(activeSec)list=list.filter(e=>e.sec===activeSec);
  if(t)list=list.filter(e=>(e.id+' '+e.name+' '+e.desc+' '+e.problem+' '+e.diff+' '+e.pain+' '+e.basis).toLowerCase().includes(t));
  grid.innerHTML='';const frag=document.createDocumentFragment();
  list.forEach(e=>frag.appendChild(card(e,term)));grid.appendChild(frag);
  countLine.textContent=`${list.length}개 표시 · 상태:${({all:'전체(숨김제외)',save:'세이브',new:'리뷰안함',hide:'숨김'})[activeStatus]}${activeSec?' · '+activeSec:''}${term?' · "'+term+'"':''}`;
  empty.style.display=list.length?'none':'block';
  syncChips();
  const c=stCounts();document.getElementById('savedNote').textContent=`⭐${c.save} · 🆕${c.new} · 🚫${c.hide}`;
}
q.addEventListener('input',rerender);

// 내보내기 / 불러오기 / 복사
document.getElementById('exp').onclick=()=>{
  const out={generated:new Date().toISOString(),status:STORE,
    saved:DATA.entries.filter(e=>getSt(e.id)==='save').map(e=>({id:e.id,name:e.name})),
    hidden:DATA.entries.filter(e=>getSt(e.id)==='hide').map(e=>e.id)};
  const blob=new Blob([JSON.stringify(out,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='idea_status.json';a.click();};
document.getElementById('impBtn').onclick=()=>document.getElementById('imp').click();
document.getElementById('imp').onchange=ev=>{const f=ev.target.files[0];if(!f)return;
  const r=new FileReader();r.onload=()=>{try{const o=JSON.parse(r.result);
    const s=o.status||o;Object.assign(STORE,s);save();rerender();alert('상태를 불러왔습니다.');}
    catch(e){alert('JSON 파싱 실패');}};r.readAsText(f);};
document.getElementById('copySave').onclick=()=>{
  const md=DATA.entries.filter(e=>getSt(e.id)==='save')
    .map(e=>`- ${e.id} · ${e.name} — ${e.desc}`).join('\n')||'(세이브한 항목 없음)';
  navigator.clipboard.writeText(md).then(()=>alert('세이브 목록을 클립보드에 복사했습니다.'),
    ()=>alert('복사 실패'));};

rerender();
</script>
</body>
</html>
